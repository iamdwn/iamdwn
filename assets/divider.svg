<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 8" width="1000" height="8" preserveAspectRatio="none" fill="none">
  <defs>
    <linearGradient id="dgrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#22D3EE" stop-opacity="0"/>
      <stop offset="42%"  stop-color="#22D3EE" stop-opacity="0.7"/>
      <stop offset="50%"  stop-color="#E6EDF3" stop-opacity="1"/>
      <stop offset="58%"  stop-color="#F472B6" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#F472B6" stop-opacity="0"/>
      <animate attributeName="x1" values="-1;1" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="0;2" dur="4s" repeatCount="indefinite"/>
    </linearGradient>
  </defs>
  <rect x="0" y="3" width="1000" height="2" fill="#21262d"/>
  <rect x="0" y="2" width="1000" height="4" rx="2" fill="url(#dgrad)"/>
</svg>
