<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" width="600" height="300" fill="none">
  <defs>
    <radialGradient id="vig" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#0f1a12"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </radialGradient>
    <radialGradient id="coreg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#67E8F9"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </radialGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="1" y="1" width="598" height="298" rx="14" fill="url(#vig)" stroke="#155e75" stroke-width="1"/>

  <!-- twinkling particles -->
  <g fill="#22D3EE">
    <circle cx="80"  cy="60"  r="1.6"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.0s" repeatCount="indefinite"/></circle>
    <circle cx="520" cy="70"  r="1.6"><animate attributeName="opacity" values="1;0.2;1" dur="2.4s" repeatCount="indefinite"/></circle>
    <circle cx="500" cy="240" r="1.4"><animate attributeName="opacity" values="0.3;1;0.3" dur="3.6s" repeatCount="indefinite"/></circle>
    <circle cx="100" cy="235" r="1.4"><animate attributeName="opacity" values="1;0.3;1" dur="2.8s" repeatCount="indefinite"/></circle>
    <circle cx="300" cy="36"  r="1.3"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.3s" repeatCount="indefinite"/></circle>
    <circle cx="48"  cy="150" r="1.3"><animate attributeName="opacity" values="1;0.3;1" dur="2.6s" repeatCount="indefinite"/></circle>
    <circle cx="552" cy="160" r="1.3"><animate attributeName="opacity" values="0.3;1;0.3" dur="3.1s" repeatCount="indefinite"/></circle>
  </g>

  <g transform="translate(300,150)" filter="url(#glow)">

    <!-- outer silhouette -->
    <circle r="86" fill="none" stroke="#22D3EE" stroke-width="1.1" opacity="0.55"/>

    <!-- latitude rings -->
    <g stroke="#22D3EE" fill="none" stroke-width="1">
      <ellipse cx="0" cy="-44" rx="74" ry="11" opacity="0.45"/>
      <ellipse cx="0" cy="0"   rx="86" ry="17" opacity="0.6"/>
      <ellipse cx="0" cy="44"  rx="74" ry="11" opacity="0.45"/>
    </g>

    <!-- rotating meridians: rx foreshortens to fake a spinning wireframe globe -->
    <g stroke="#22D3EE" fill="none" stroke-width="1.2">
      <ellipse cx="0" cy="0" ry="86">
        <animate attributeName="rx" values="86;3;86" keyTimes="0;0.5;1" dur="7s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.95;0.25;0.95" keyTimes="0;0.5;1" dur="7s" repeatCount="indefinite"/>
      </ellipse>
      <ellipse cx="0" cy="0" ry="86">
        <animate attributeName="rx" values="86;3;86" keyTimes="0;0.5;1" dur="7s" begin="-1.17s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.95;0.25;0.95" keyTimes="0;0.5;1" dur="7s" begin="-1.17s" repeatCount="indefinite"/>
      </ellipse>
      <ellipse cx="0" cy="0" ry="86">
        <animate attributeName="rx" values="86;3;86" keyTimes="0;0.5;1" dur="7s" begin="-2.34s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.95;0.25;0.95" keyTimes="0;0.5;1" dur="7s" begin="-2.34s" repeatCount="indefinite"/>
      </ellipse>
      <ellipse cx="0" cy="0" ry="86">
        <animate attributeName="rx" values="86;3;86" keyTimes="0;0.5;1" dur="7s" begin="-3.5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.95;0.25;0.95" keyTimes="0;0.5;1" dur="7s" begin="-3.5s" repeatCount="indefinite"/>
      </ellipse>
      <ellipse cx="0" cy="0" ry="86">
        <animate attributeName="rx" values="86;3;86" keyTimes="0;0.5;1" dur="7s" begin="-4.67s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.95;0.25;0.95" keyTimes="0;0.5;1" dur="7s" begin="-4.67s" repeatCount="indefinite"/>
      </ellipse>
      <ellipse cx="0" cy="0" ry="86">
        <animate attributeName="rx" values="86;3;86" keyTimes="0;0.5;1" dur="7s" begin="-5.84s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.95;0.25;0.95" keyTimes="0;0.5;1" dur="7s" begin="-5.84s" repeatCount="indefinite"/>
      </ellipse>
    </g>

    <!-- glowing pulsing core -->
    <circle r="7" fill="url(#coreg)">
      <animate attributeName="r" values="6;9;6" dur="2.4s" repeatCount="indefinite"/>
    </circle>

    <!-- tilted orbit with travelling electron -->
    <g transform="rotate(-22)">
      <ellipse cx="0" cy="0" rx="120" ry="40" stroke="#F472B6" stroke-width="1" fill="none" opacity="0.5"/>
      <circle r="3.4" fill="#F9A8D4">
        <animateMotion dur="4.2s" repeatCount="indefinite"
          path="M120,0 A120,40 0 1,1 -120,0 A120,40 0 1,1 120,0"/>
      </circle>
    </g>
    <!-- second orbit, opposite tilt -->
    <g transform="rotate(28)">
      <ellipse cx="0" cy="0" rx="108" ry="34" stroke="#22D3EE" stroke-width="1" fill="none" opacity="0.4"/>
      <circle r="3" fill="#67E8F9">
        <animateMotion dur="5.6s" repeatCount="indefinite"
          path="M-108,0 A108,34 0 1,1 108,0 A108,34 0 1,1 -108,0"/>
      </circle>
    </g>
  </g>
</svg>
