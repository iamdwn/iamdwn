<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 150" width="620" height="150" fill="none">
  <defs>
    <linearGradient id="fi" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#22D3EE"/>
      <stop offset="50%"  stop-color="#E6EDF3"/>
      <stop offset="100%" stop-color="#F472B6"/>
    </linearGradient>
    <clipPath id="txt">
      <text x="50%" y="50%" dy="0.35em" text-anchor="middle"
            font-family="'JetBrains Mono','Segoe UI',Helvetica,Arial,sans-serif"
            font-size="96" font-weight="800" letter-spacing="4">Dozun</text>
    </clipPath>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <text x="50%" y="50%" dy="0.35em" text-anchor="middle"
        font-family="'JetBrains Mono','Segoe UI',Helvetica,Arial,sans-serif"
        font-size="96" font-weight="800" letter-spacing="4"
        fill="url(#fi)" filter="url(#glow)">Dozun</text>
  <g clip-path="url(#txt)">
    <rect x="-200" y="0" width="120" height="150" fill="#ffffff" opacity="0.45" transform="skewX(-18)">
      <animate attributeName="x" values="-220;700" dur="3.4s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
