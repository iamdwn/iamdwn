<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 64" width="300" height="64" fill="none">
  <defs>
    <linearGradient id="btn" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
  </defs>

  <!-- pulsing glow border -->
  <rect x="6" y="6" width="288" height="52" rx="26"
        fill="url(#btn)" stroke="#4AF626" stroke-width="2">
    <animate attributeName="stroke-opacity" values="0.35;1;0.35" dur="2s" repeatCount="indefinite"/>
  </rect>

  <!-- soft outer glow -->
  <rect x="6" y="6" width="288" height="52" rx="26"
        fill="none" stroke="#4AF626" stroke-width="6" opacity="0.0">
    <animate attributeName="opacity" values="0;0.25;0" dur="2s" repeatCount="indefinite"/>
  </rect>

  <!-- animated status dot -->
  <circle cx="40" cy="32" r="6" fill="#4AF626">
    <animate attributeName="r" values="5;7;5" dur="1.4s" repeatCount="indefinite"/>
    <animate attributeName="fill-opacity" values="0.6;1;0.6" dur="1.4s" repeatCount="indefinite"/>
  </circle>

  <text x="64" y="28" font-family="'JetBrains Mono','Segoe UI',Helvetica,Arial,sans-serif"
        font-size="15" font-weight="700" fill="#e6edf3">Gặp Bọ Chán</text>
  <text x="64" y="46" font-family="'JetBrains Mono','Segoe UI',Helvetica,Arial,sans-serif"
        font-size="12" font-weight="500" fill="#4AF626" letter-spacing="2">GÂU GÂU !</text>
</svg>
