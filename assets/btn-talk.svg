<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 116" width="380" height="116" fill="none">
  <defs>
    <linearGradient id="pill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <clipPath id="lensclip">
      <polygon points="-19,-12 -4,-13 -3,-2 -18,-1"/>
      <polygon points="4,-13 19,-12 18,-1 3,-2"/>
    </clipPath>
  </defs>

  <!-- soft glow -->
  <rect x="6" y="8" width="368" height="100" rx="50" fill="none" stroke="#4AF626" stroke-width="6" opacity="0">
    <animate attributeName="opacity" values="0;0.2;0" dur="2.6s" repeatCount="indefinite"/>
  </rect>
  <!-- pill body -->
  <rect x="6" y="8" width="368" height="100" rx="50" fill="url(#pill)" stroke="#4AF626" stroke-width="1.6">
    <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="2.6s" repeatCount="indefinite"/>
  </rect>

  <!-- ===== COOL DOG ===== -->
  <g transform="translate(92,60) scale(0.82)">

    <!-- tail (lean, slow flick) -->
    <g>
      <path d="M12,30 q16,-3 20,-19" stroke="#2e333b" stroke-width="6" stroke-linecap="round" fill="none"/>
      <animateTransform attributeName="transform" type="rotate" values="-6 12 30;9 12 30;-6 12 30" dur="1.5s" repeatCount="indefinite"/>
    </g>

    <!-- lean body -->
    <path d="M-13,24 L13,24 L9,45 L-9,45 Z" fill="#2e333b" stroke="#15181d" stroke-width="1"/>
    <path d="M-6,27 L6,27 L4,43 L-4,43 Z" fill="#3b424b" opacity="0.6"/>
    <!-- thin front legs -->
    <line x1="-6" y1="42" x2="-6" y2="48" stroke="#2e333b" stroke-width="5" stroke-linecap="round"/>
    <line x1="6"  y1="42" x2="6"  y2="48" stroke="#2e333b" stroke-width="5" stroke-linecap="round"/>

    <!-- ears (sharp, erect) -->
    <polygon points="-18,-16 -28,-42 -6,-22" fill="#23272e"/>
    <polygon points="-16,-19 -22,-36 -9,-24" fill="#4AF626" opacity="0.22"/>
    <polygon points="18,-16 28,-42 6,-22" fill="#23272e"/>
    <polygon points="16,-19 22,-36 9,-24" fill="#4AF626" opacity="0.22"/>

    <!-- angular head -->
    <path d="M-22,-16 L22,-16 L17,6 L7,17 L0,21 L-7,17 L-17,6 Z" fill="#2e333b" stroke="#15181d" stroke-width="1"/>
    <!-- lighter muzzle -->
    <path d="M-9,6 L9,6 L6,17 L0,21 L-6,17 Z" fill="#3b424b"/>

    <!-- smirk + fang -->
    <path d="M-7,15 q9,7 15,-1" stroke="#0d0f12" stroke-width="1.6" fill="none" stroke-linecap="round"/>
    <polygon points="3.5,15.5 6.5,15.5 5,20" fill="#ffffff"/>
    <!-- nose -->
    <path d="M-4,13 q4,-3 8,0 l-4,7 Z" fill="#0d0f12"/>

    <!-- collar -->
    <path d="M-16,19 q16,9 32,0" stroke="#4AF626" stroke-width="3.4" fill="none" stroke-linecap="round"/>
    <circle cx="0" cy="24" r="2.4" fill="#7dff5c"/>

    <!-- sunglasses -->
    <g>
      <polygon points="-19,-12 -4,-13 -3,-2 -18,-1" fill="#0d1117" stroke="#4AF626" stroke-width="2"/>
      <polygon points="4,-13 19,-12 18,-1 3,-2" fill="#0d1117" stroke="#4AF626" stroke-width="2"/>
      <line x1="-4" y1="-9" x2="4" y2="-9" stroke="#4AF626" stroke-width="2.4"/>
      <line x1="-19" y1="-10" x2="-25" y2="-15" stroke="#4AF626" stroke-width="2"/>
      <line x1="19" y1="-10" x2="25" y2="-15" stroke="#4AF626" stroke-width="2"/>
      <!-- shine sweep across lenses -->
      <g clip-path="url(#lensclip)">
        <rect x="-46" y="-16" width="9" height="18" fill="#7dff5c" opacity="0.55" transform="skewX(-22)">
          <animate attributeName="x" values="-46;42" dur="3.2s" repeatCount="indefinite"/>
        </rect>
      </g>
    </g>

    <!-- speech bubble: Gâu! -->
    <g transform="translate(30,-38)">
      <rect x="0" y="-12" width="44" height="22" rx="11" fill="#4AF626"/>
      <path d="M6,9 l-6,9 l13,-6 Z" fill="#4AF626"/>
      <text x="22" y="3" text-anchor="middle" font-family="'JetBrains Mono','Segoe UI',sans-serif" font-size="11" font-weight="800" fill="#0d1117">Gâu!</text>
      <animateTransform attributeName="transform" type="translate" values="30 -38;30 -41;30 -38" dur="2.6s" repeatCount="indefinite"/>
    </g>
  </g>

  <!-- ===== TEXT ===== -->
  <text x="152" y="52" font-family="'JetBrains Mono','Segoe UI',Helvetica,Arial,sans-serif"
        font-size="19" font-weight="800" fill="#e6edf3">Chat với Bọ Chán</text>
  <g transform="translate(152,68)">
    <g fill="#4AF626">
      <ellipse cx="0" cy="6" rx="5" ry="4"/>
      <circle cx="-5" cy="-1" r="2"/>
      <circle cx="0" cy="-3" r="2"/>
      <circle cx="5" cy="-1" r="2"/>
    </g>
    <text x="16" y="10" font-family="'JetBrains Mono','Segoe UI',sans-serif" font-size="13" font-weight="700" fill="#4AF626" letter-spacing="2">GÂU GÂU !</text>
  </g>
</svg>
